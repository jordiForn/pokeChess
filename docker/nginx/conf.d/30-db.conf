server {
    listen 443 ssl;
    http2 on;
    server_name db.pokechess.local;

    ssl_certificate     /nginx/ssl/pokechess.crt;
    ssl_certificate_key /nginx/ssl/pokechess.key;
    include /nginx/ssl/ssl-params.conf;

    location / {
        proxy_pass http://phpmyadmin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
    }
}
