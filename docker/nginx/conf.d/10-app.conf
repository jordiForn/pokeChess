server {
    listen 443 ssl default_server;
    http2 on;
    server_name pokechess.local www.pokechess.local;

    ssl_certificate     /nginx/ssl/pokechess.crt;
    ssl_certificate_key /nginx/ssl/pokechess.key;
    include /nginx/ssl/ssl-params.conf;

    root /var/www/frontend/browser;
    index index.html;

    location ^~ /api/ {
        include fastcgi_params;
        fastcgi_pass php-fpm:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/backend/public;
        fastcgi_param HTTPS on;
        fastcgi_read_timeout 300;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|map|json|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
