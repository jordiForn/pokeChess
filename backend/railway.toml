[build]
builder = "nixpacks"
buildCommand = "composer install --no-dev --optimize-autoloader --no-interaction"

[deploy]
preDeployCommand = "php artisan migrate --force --no-interaction"
startCommand = "chmod +x ./railway/start.sh && ./railway/start.sh"
healthcheckPath = "/up"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
