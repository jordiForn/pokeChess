<header class="navbar">
  <a class="brand" routerLink="/home">Pokemon Chess</a>

  <nav class="links">
    <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
    <a routerLink="/chess" routerLinkActive="active">Ajedrez</a>
    <a routerLink="/profile" routerLinkActive="active">Perfil</a>
    @if (isAdmin()) {
      <a routerLink="/admin" routerLinkActive="active">Admin</a>
    }
  </nav>

  <div class="user-area">
    <div class="user-profile">
      @if (user()?.avatar; as avatar) {
        <img class="user-avatar" [src]="avatar" [alt]="user()?.name ?? 'Avatar'" />
      } @else {
        <span class="user-avatar-fallback">{{ initials() }}</span>
      }
      <span class="user-name">{{ user()?.name }}</span>
    </div>
    <button type="button" (click)="logout()">Salir</button>
  </div>
</header>
