@if (pendingPromotion()) {
  <div class="promotion-backdrop">
    <div class="promotion-modal" role="dialog" aria-labelledby="promotion-title">
      <h2 id="promotion-title">Elige promoción</h2>
      <p class="hint">Tu peón ha llegado a la última fila.</p>

      <div class="options">
        @for (option of options(); track option.piece) {
          <button type="button" class="option" (click)="select(option.piece)">
            @if (option.pokemon; as pokemon) {
              <img [src]="pokemon.spriteUrl" [alt]="pokemon.name" />
              <span class="name">{{ pokemon.name }}</span>
            }
            <span class="role">{{ option.label }}</span>
          </button>
        }
      </div>
    </div>
  </div>
}
