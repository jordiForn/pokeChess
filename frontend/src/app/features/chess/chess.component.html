<section class="page">
  <header class="page-header">
    <div>
      <h1>Pokemon Chess</h1>
      <p>
        @if (vsAi()) {
          Modo vs IA · Juegas con {{ playerColorLabel() }} · Turno: {{ turnLabel() }}
        } @else {
          Modo local · 2 jugadores · Turno: {{ turnLabel() }}
        }
        @if (aiThinking()) {
          · IA pensando...
        }
      </p>
    </div>

    <button type="button" (click)="newGame()" [disabled]="aiThinking()">Nueva partida</button>
  </header>

  <app-chess-board />
  <app-piece-inventory-panel />
  <app-promotion-modal />
</section>
